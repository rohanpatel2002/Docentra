openapi: 3.0.3
info:
  title: AI Document Assistant API
  description: |
    RAG (Retrieval-Augmented Generation) backend that allows users to:
    - Register and Login via JWT.
    - Upload documents PDF/Text.
    - Perform semantic search across their own private document library.
    - Query context aware information using vector embeddings.
  version: 1.0.0
  contact:
    name: API Support
    url: https://github.com/rohanpatel2002/AI-Document-Assistant
api
servers:
  - url: http://localhost:8080
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegister:
      type: object
      required: [email, password]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    
    UserLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        token:
          type: string
        user_id:
          type: integer

    Document:
      type: object
      properties:
        id:
          type: integer
        original_name:
          type: string
        mime_type:
          type: string
        size:
          type: integer
        status:
          type: string
          enum: [PENDING, PROCESSING, READY, FAILED]
        created_at:
          type: string
          format: date-time

    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          example: "What is the company policy on remote work?"

    SearchResult:
      type: object
      properties:
        content:
          type: string
        document_id:
          type: integer
        original_name:
          type: string
        distance:
          type: number

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /api/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: User created
        '400':
          description: Invalid input

  /api/login:
    post:
      tags: [Authentication]
      summary: Authenticate a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized

  /api/documents:
    get:
      tags: [Documents]
      summary: List all user documents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
    post:
      tags: [Documents]
      summary: Upload a new document
      security:
        - bearerAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document:
                  type: string
                  format: binary
      responses:
        '201':
          description: Document uploaded and processing started
        '429':
          description: Rate limit exceeded

  /api/documents/{id}:
    get:
      tags: [Documents]
      summary: Check document status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Current status of the document
    delete:
      tags: [Documents]
      summary: Delete a document and its vectors
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted successfully

  /api/search:
    post:
      tags: [AI Search]
      summary: Semantic vector search
      description: Search for relevant text chunks across all your documents using vector similarity.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'

  /api/query:
    post:
      tags: [AI Search]
      summary: Perform a semantic query (RAG Context)
      description: Returns query intent and matched context for LLM processing.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Context-aware query results

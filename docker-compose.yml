services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: doc_ai_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidocdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aidocdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: doc_ai_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=aidocdb
      - PORT=8080
      - PYTHON_PATH=python3
      - SCRIPT_PATH=/app/embedding-service/app/main.py
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - model_cache:/app/.cache
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  uploads:
  model_cache:
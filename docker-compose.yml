version: '3.8'

services:
  db:
    # Upgraded to include pgvector extension for semantic search
    image: ankane/pgvector:v0.5.1
    container_name: doc_ai_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidocdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: doc_ai_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=aidocdb
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000
    depends_on:
      - db
      - embedding-service

  embedding-service:
    build:
      context: ./embedding-service
    container_name: doc_ai_embedding
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

volumes:
  pgdata:
